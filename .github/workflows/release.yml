name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-matrix:
    name: build-${{ matrix.os }}-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: wxml-parser-rust.linux-x64-gnu.node
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: wxml-parser-rust.win32-x64-msvc.node
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: wxml-parser-rust.darwin-x64.node
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: wxml-parser-rust.darwin-arm64.node

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build native binding
        run: npx napi build --target ${{ matrix.target }} --release --cargo-cwd crates/wxml-parser-napi

      - name: Upload binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  collect:
    name: collect-and-verify
    runs-on: ubuntu-latest
    needs: build-matrix

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all binding artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect bindings into folder
        run: npm run collect:bindings

      - name: Build local platform binding for tests
        run: npm run build:ci

      - name: Verify test suite
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Pack tarball
        run: npm pack

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: '*.tgz'
          if-no-files-found: error

  publish:
    name: publish-npm
    runs-on: ubuntu-latest
    needs: collect
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download npm tarball
        uses: actions/download-artifact@v4
        with:
          name: npm-tarball
          path: .

      - name: Publish package
        run: npm publish ./*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
